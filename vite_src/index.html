<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>EventFlow</title>
    <script>window.__BACKEND_URL__ = '/api/companies/EventFlow/app';</script>
    <script>window.__COMPANY_SLUG__ = 'EventFlow';</script>
    <script>window.__NC_BASE__ = 'https://astarlabshub.com';</script>
    <script>
      // 1) Stop browser-extension errors (session recorders, ad blockers, etc.) from
      //    surfacing as uncaught page errors — they are not part of this app.
      // 2) Report REAL app errors to the platform (auto-queues a coder fix task) —
      //    this used to exist only in the CDN fallback, so Vite builds (the normal
      //    case) never self-healed from real-user runtime errors.
      // 3) Send one pageview beacon per load so the company dashboard shows real traffic.
      (function () {
        function foreign(s) {
          s = s || '';
          if (/(?:chrome|moz|safari|ms-browser|edge)-extension:\/\//.test(s)) return true;
          if (/recordConsoleEvents|gen-mapping/.test(s) && s.indexOf(location.origin) === -1) return true;
          return false;
        }
        var NC = window.__NC_BASE__ || '';
        var SLUG = window.__COMPANY_SLUG__ || '';
        var _lastErr = '';
        function beacon(path, payload) {
          try {
            if (!SLUG || !navigator.sendBeacon) return;
            navigator.sendBeacon(NC + path,
              new Blob([JSON.stringify(payload)], { type: 'application/json' }));
          } catch (e) {}
        }
        function reportErr(msg, stack) {
          var text = String(stack || msg || '').slice(0, 800);
          if (!text || text === _lastErr) return;   // one report per distinct error
          _lastErr = text;
          beacon('/api/sites/' + SLUG + '/report-error', { error: text, url: location.href });
        }
        window.addEventListener('error', function (e) {
          var src = (e && e.filename) || '';
          var stack = e && e.error && e.error.stack || '';
          if (foreign(src) || foreign(stack)) { e.stopImmediatePropagation(); e.preventDefault(); return false; }
          reportErr(e && e.message, stack);
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          var stack = e && e.reason && (e.reason.stack || String(e.reason)) || '';
          if (foreign(stack)) { e.stopImmediatePropagation(); e.preventDefault(); return; }
          reportErr('Unhandled rejection', stack);
        }, true);
        // Pageview beacon (fire-and-forget, once per page load)
        beacon('/api/sites/' + SLUG + '/pv', { p: location.pathname, r: document.referrer || '' });
        // "Built with Agentica" badge — every deployed company is a live referral
        // for the platform (PLG loop). Injected by the platform shell so app code
        // can never accidentally remove it.
        function addBadge() {
          try {
            if (!NC || document.getElementById('nc-badge')) return;
            var a = document.createElement('a');
            a.id = 'nc-badge';
            a.href = NC + '/?ref=' + encodeURIComponent(SLUG) + '&utm_source=built_with_badge';
            a.target = '_blank';
            a.rel = 'noopener';
            a.textContent = '⚡ Built with Agentica';
            a.style.cssText = 'position:fixed;bottom:14px;left:14px;z-index:2147483000;' +
              'font:600 11px/1 system-ui,sans-serif;color:#9aa6bd;text-decoration:none;' +
              'background:rgba(5,8,16,.82);border:1px solid rgba(255,255,255,.14);' +
              'padding:7px 11px;border-radius:999px;backdrop-filter:blur(6px);' +
              'box-shadow:0 2px 12px rgba(0,0,0,.35);opacity:.85;transition:opacity .2s';
            a.onmouseenter = function () { a.style.opacity = '1'; };
            a.onmouseleave = function () { a.style.opacity = '.85'; };
            document.body.appendChild(a);
          } catch (e) {}
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', addBadge);
        } else { addBadge(); }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {

    </script>

        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
      }
